include:
  - path: ./compose.yml
  - env_file: ./.env.example

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.dev
    image: gamux/api-gamux-dev:latest
    env_file:
      - .env.example
    environment:
      - SPRING_DOCKER_COMPOSE_ENABLED=false
    ports:
      - '8080:8080'
    volumes:
      - ./backend:/app

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: gamux/website-gamux-dev:latest
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true